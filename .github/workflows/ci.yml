name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Type-check Frontend
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexus-control/package-lock.json

      - name: Install frontend dependencies
        working-directory: nexus-control
        run: npm ci

      - name: TypeScript type check
        working-directory: nexus-control
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: nexus-control
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Job 2: Build Frontend (produces dist/ for Tauri)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexus-control/package-lock.json

      - name: Install frontend dependencies
        working-directory: nexus-control
        run: npm ci

      - name: Build frontend
        working-directory: nexus-control
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: nexus-control/dist
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3: Rust / Tauri Backend Build
  # ---------------------------------------------------------------------------
  backend-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libudev-dev \
            pkg-config \
            build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexus-control/src-tauri

      - name: cargo check
        working-directory: nexus-control/src-tauri
        run: cargo check

      - name: cargo fmt check
        working-directory: nexus-control/src-tauri
        run: cargo fmt --check

  # ---------------------------------------------------------------------------
  # Job 4: Cargo Tests
  # ---------------------------------------------------------------------------
  backend-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libudev-dev \
            pkg-config \
            build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexus-control/src-tauri

      - name: cargo test
        working-directory: nexus-control/src-tauri
        run: cargo test

  # ---------------------------------------------------------------------------
  # Job 5: Tauri Build (only on main/develop push + after frontend build)
  # ---------------------------------------------------------------------------
  tauri-build:
    name: Tauri Build (NSIS Installer)
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check]
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libudev-dev \
            pkg-config \
            build-essential \
            nsis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexus-control/package-lock.json

      - name: Install frontend dependencies
        working-directory: nexus-control
        run: npm ci

      - name: Build frontend
        working-directory: nexus-control
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexus-control/src-tauri

      - name: Build Tauri app (NSIS)
        working-directory: nexus-control/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build 2>&1

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-control-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sha256
          retention-days: 5

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-control-portable
          path: src-tauri/target/release/nexus-control.exe
          retention-days: 5
